# Runs the full test suite on pushes and pull requests.
# Use this workflow as a required status check in branch protection to block merges when tests fail.
name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dotnet-test:
    name: dotnet test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x

      - name: Restore
        run: dotnet restore ChessAnalyser.sln

      - name: Test
        run: dotnet test ChessAnalyser.sln --no-restore --configuration Release --verbosity normal
